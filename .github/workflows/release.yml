name: Build Desktop App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies & Build Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --onefile --distpath ./frontend/src-tauri/bin --name backend-x86_64-pc-windows-msvc run_backend.py

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Tauri App
        working-directory: ./frontend
        run: npm run tauri build

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: BackingTrackReplicator-Installer
          path: frontend/src-tauri/target/release/bundle/msi/*.msi
